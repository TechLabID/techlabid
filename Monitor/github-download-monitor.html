<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechLabID GitHub Release Download Monitor</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:30px;margin:0}
.card{background:#1e293b;padding:18px;border-radius:14px;margin-bottom:18px}
.asset{display:grid;grid-template-columns:45px 1fr 130px;gap:12px;align-items:center;border-top:1px solid #334155;padding:12px 0}
.rank{font-size:22px;font-weight:bold;color:#38bdf8}
.downloads{text-align:right;font-weight:bold;color:#38bdf8}
.total{font-size:32px;color:#38bdf8;font-weight:bold}
input,button{padding:10px 14px;border-radius:8px;border:0;margin:5px;font-size:16px}
button{background:#38bdf8;cursor:pointer;font-weight:bold;color:#020617}
small{color:#94a3b8}
</style>
</head>
<body>

<h1>GitHub Release Download Monitor</h1>

<input id="owner" value="TechLabID" placeholder="GitHub Owner">
<input id="repo" value="techlabid" placeholder="Repo Name">
<button onclick="loadStats()">Check Downloads</button>

<div id="result"></div>

<script>
function cleanAssetName(name){
  return name
    .replace(/\.zip$/i, "")
    .replace(/-?3D-?Asset/gi, "")
    .replace(/[-_]+/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

async function loadStats(){
  const owner = document.getElementById("owner").value.trim();
  const repo = document.getElementById("repo").value.trim();
  const url = `https://api.github.com/repos/${owner}/${repo}/releases`;

  const result = document.getElementById("result");
  result.innerHTML = "Loading...";

  try {
    const res = await fetch(url, {
      headers: { "Accept": "application/vnd.github+json" }
    });

    if (!res.ok) throw new Error("Repo tidak ditemukan / rate limit API");

    const releases = await res.json();
    let total = 0;
    let assets = [];

    releases.forEach(release => {
      release.assets.forEach(asset => {
        total += asset.download_count;
        assets.push({
          name: cleanAssetName(asset.name),
          file: asset.name,
          downloads: asset.download_count,
          release: release.name || release.tag_name,
          tag: release.tag_name,
          url: asset.browser_download_url
        });
      });
    });

    assets.sort((a, b) => b.downloads - a.downloads);

    let topHtml = "";

    assets.forEach((asset, index) => {
      topHtml += `
        <div class="asset">
          <div class="rank">${index + 1}</div>
          <div>
            <div>${asset.name}</div>
            <small>${asset.release} • ${asset.file}</small>
          </div>
          <div class="downloads">${asset.downloads} downloads</div>
        </div>
      `;
    });

    result.innerHTML = `
      <div class="card">
        <h2>🏆 Top Downloaded Assets</h2>
        ${topHtml || "<p>Belum ada asset release.</p>"}
      </div>

      <div class="card">
        <h2>Total Downloads</h2>
        <div class="total">${total}</div>
      </div>
    `;

  } catch (err) {
    result.innerHTML = `<p style="color:#f87171">${err.message}</p>`;
  }
}

loadStats();
</script>

</body>
</html>
